apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthclaw-api
  namespace: healthclaw
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthclaw-api
  template:
    metadata:
      labels:
        app: healthclaw-api
    spec:
      containers:
        - name: api
          image: healthclaw-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: healthclaw-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20

