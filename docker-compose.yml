services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: healthclaw
      POSTGRES_PASSWORD: healthclaw
      POSTGRES_DB: healthclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthclaw -d healthclaw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://healthclaw:healthclaw@postgres:5432/healthclaw
      REDIS_URL: redis://redis:6379/0
      AUTO_CREATE_DB: "true"
      API_KEY: dev-healthclaw-key
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-google/gemini-2.5-flash-lite}
      OPENROUTER_CHAT_FALLBACK_MODELS: ${OPENROUTER_CHAT_FALLBACK_MODELS:-google/gemini-2.0-flash-lite-001,openai/gpt-5.4-nano}
      OPENROUTER_TRANSCRIBE_MODEL: ${OPENROUTER_TRANSCRIBE_MODEL:-mistralai/voxtral-small-24b-2507}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Healthclaw}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-healthclaw}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["arq", "healthclaw.workers.queue.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+asyncpg://healthclaw:healthclaw@postgres:5432/healthclaw
      REDIS_URL: redis://redis:6379/0
      AUTO_CREATE_DB: "false"
      API_KEY: dev-healthclaw-key
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-google/gemini-2.5-flash-lite}
      OPENROUTER_CHAT_FALLBACK_MODELS: ${OPENROUTER_CHAT_FALLBACK_MODELS:-google/gemini-2.0-flash-lite-001,openai/gpt-5.4-nano}
      OPENROUTER_TRANSCRIBE_MODEL: ${OPENROUTER_TRANSCRIBE_MODEL:-mistralai/voxtral-small-24b-2507}
      OPENROUTER_DECISION_MODEL: ${OPENROUTER_DECISION_MODEL:-google/gemini-2.5-flash-lite}
      OPENROUTER_DREAM_MODEL: ${OPENROUTER_DREAM_MODEL:-google/gemini-2.5-flash-lite}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Healthclaw}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-healthclaw}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres-data:
